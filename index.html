<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Calculadora de Arbitraje Deportivo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-light: #EAF3DE;
      --green-mid: #97C459;
      --green-dark: #639922;
      --green-text: #27500A;
      --green-sub: #3B6D11;
      --bg: #f5f5f3;
      --bg-card: #ffffff;
      --bg-input: #f5f5f3;
      --text: #1a1a18;
      --text-muted: #666;
      --border: rgba(0,0,0,0.15);
      --border-input: rgba(0,0,0,0.2);
      --radius-sm: 8px;
      --radius-md: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-card: #252523;
        --bg-input: #2e2e2c;
        --text: #f0f0ee;
        --text-muted: #999;
        --border: rgba(255,255,255,0.12);
        --border-input: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .app { width: 100%; max-width: 540px; }

    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--text-muted); }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label, .field-full label {
      font-size: 12px; color: var(--text-muted);
      font-weight: 500; letter-spacing: 0.02em;
    }
    .field-full label { display: block; margin-bottom: 6px; }

    input[type="number"] {
      width: 100%; height: 44px;
      font-size: 20px; font-weight: 500;
      padding: 0 12px;
      border: 0.5px solid var(--border-input);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text);
      text-align: right;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
      font-family: inherit;
    }
    input[type="number"]:focus {
      border-color: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .status-bar {
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.25s, border-color 0.25s;
    }
    .status-bar.arb { background: var(--green-light); border: 0.5px solid var(--green-mid); }
    .status-bar.no-arb { background: var(--bg-input); border: 0.5px solid var(--border); }

    .status-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.25s;
    }
    .status-bar.arb .status-icon { background: var(--green-dark); }
    .status-bar.no-arb .status-icon { background: rgba(0,0,0,0.25); }

    .status-text { flex: 1; }
    .status-title { font-size: 15px; font-weight: 500; }
    .status-bar.arb .status-title { color: var(--green-text); }
    .status-bar.no-arb .status-title { color: var(--text); }
    .status-sub { font-size: 12px; margin-top: 2px; }
    .status-bar.arb .status-sub { color: var(--green-sub); }
    .status-bar.no-arb .status-sub { color: var(--text-muted); }

    .margin-badge {
      font-size: 13px; font-weight: 500;
      padding: 4px 10px; border-radius: var(--radius-sm);
      white-space: nowrap;
    }
    .status-bar.arb .margin-badge { background: var(--green-dark); color: var(--green-light); }
    .status-bar.no-arb .margin-badge { background: var(--border); color: var(--text-muted); }

    .section-title {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
    }

    .stake-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .stake-row.no-border { border-bottom: none; }
    .stake-label { font-size: 13px; color: var(--text-muted); }
    .stake-label.total { font-weight: 500; color: var(--text); }
    .stake-right { text-align: right; }
    .stake-amount { font-size: 16px; font-weight: 500; }
    .stake-pct { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .divider { height: 0.5px; background: var(--border); margin: 4px 0; }

    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: var(--bg-input); border-radius: var(--radius-sm); padding: 14px 16px; }
    .metric label {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-bottom: 6px;
    }
    .metric .value { font-size: 22px; font-weight: 500; }
    .metric .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .metric.highlight { background: var(--green-light); }
    .metric.highlight .value { color: var(--green-text); }
  </style>
</head>
<body>
  <div class="app">

    <div class="header">
      <h1>Calculadora de arbitraje</h1>
      <p>Ingresá las cuotas y el monto total a apostar</p>
    </div>

    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>Cuota A</label>
          <input type="number" id="cuotaA" value="2.63" step="0.01" min="1.01" inputmode="decimal">
        </div>
        <div class="field">
          <label>Cuota B</label>
          <input type="number" id="cuotaB" value="1.84" step="0.01" min="1.01" inputmode="decimal">
        </div>
      </div>
      <div class="field-full">
        <label>Monto total ($)</label>
        <input type="number" id="monto" value="50000" step="100" min="1" inputmode="numeric">
      </div>
    </div>

    <div class="status-bar no-arb" id="statusBar">
      <div class="status-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path id="statusPath" d="M3 8l4 4 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="status-text">
        <div class="status-title" id="statusTitle">—</div>
        <div class="status-sub" id="statusSub">—</div>
      </div>
      <div class="margin-badge" id="marginBadge">—</div>
    </div>

    <div class="card">
      <p class="section-title">Distribución de stakes</p>
      <div class="stake-row">
        <div class="stake-label">Stake A</div>
        <div class="stake-right">
          <div class="stake-amount" id="stakeA">—</div>
          <div class="stake-pct" id="stakeAPct">—</div>
        </div>
      </div>
      <div class="stake-row">
        <div class="stake-label">Stake B</div>
        <div class="stake-right">
          <div class="stake-amount" id="stakeB">—</div>
          <div class="stake-pct" id="stakeBPct">—</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="stake-row no-border">
        <div class="stake-label total">Total</div>
        <div class="stake-amount" id="totalDisplay">—</div>
      </div>
    </div>

    <div class="results-grid">
      <div class="metric" id="gananciaCard">
        <label>Ganancia neta</label>
        <div class="value" id="ganancia">—</div>
        <div class="sub" id="gananciaPct">—</div>
      </div>
      <div class="metric" id="retornoCard">
        <label>Retorno garantizado</label>
        <div class="value" id="retorno">—</div>
        <div class="sub">retorno si gana A</div>
      </div>
    </div>

  </div>

  <script>
    function fmt(n) {
      return '$' + Math.round(n).toLocaleString('es-AR');
    }

    function calc() {
      var a = parseFloat(document.getElementById('cuotaA').value) || 0;
      var b = parseFloat(document.getElementById('cuotaB').value) || 0;
      var m = parseFloat(document.getElementById('monto').value) || 0;
      if (a <= 1 || b <= 1 || m <= 0) return;

      var pA = 1 / a, pB = 1 / b, sum = pA + pB;
      var isArb = sum < 1;
      var marginAbs = Math.abs((sum - 1) * 100).toFixed(2);
      var stakeA = (m * pA) / sum;
      var stakeB = (m * pB) / sum;
      var ganancia = (stakeA * a) - m;
      var retorno = stakeA * a;

      var sb = document.getElementById('statusBar');
      var gc = document.getElementById('gananciaCard');
      var rc = document.getElementById('retornoCard');

      if (isArb) {
        sb.className = 'status-bar arb';
        document.getElementById('statusTitle').textContent = 'Arbitraje detectado';
        document.getElementById('statusSub').textContent = 'Existe oportunidad de ganancia garantizada';
        document.getElementById('marginBadge').textContent = '-' + marginAbs + '%';
        document.getElementById('statusPath').setAttribute('d', 'M3 8l4 4 6-6');
        gc.classList.add('highlight');
        rc.classList.add('highlight');
      } else {
        sb.className = 'status-bar no-arb';
        document.getElementById('statusTitle').textContent = 'Sin arbitraje';
        document.getElementById('statusSub').textContent = 'El margen de la casa impide la ganancia';
        document.getElementById('marginBadge').textContent = '+' + marginAbs + '%';
        document.getElementById('statusPath').setAttribute('d', 'M4 4l8 8M12 4l-8 8');
        gc.classList.remove('highlight');
        rc.classList.remove('highlight');
      }

      document.getElementById('stakeA').textContent = fmt(stakeA);
      document.getElementById('stakeB').textContent = fmt(stakeB);
      document.getElementById('stakeAPct').textContent = ((stakeA / m) * 100).toFixed(1) + '% del total';
      document.getElementById('stakeBPct').textContent = ((stakeB / m) * 100).toFixed(1) + '% del total';
      document.getElementById('totalDisplay').textContent = fmt(m);
      document.getElementById('ganancia').textContent = fmt(ganancia);
      document.getElementById('gananciaPct').textContent = ((ganancia / m) * 100).toFixed(2) + '% de rendimiento';
      document.getElementById('retorno').textContent = fmt(retorno);
    }

    document.getElementById('cuotaA').addEventListener('input', calc);
    document.getElementById('cuotaB').addEventListener('input', calc);
    document.getElementById('monto').addEventListener('input', calc);
    calc();
  </script>
</body>
</html>
